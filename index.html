<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Failure Probability Over Time</title>
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="failureRatePlot.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Play", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 0;
      padding: 2rem 2.5rem 2rem 2rem;
      width: 860px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    .header { margin-bottom: 1.5rem; }

    .header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: 0.01em;
    }

    .header p {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.3rem;
    }

    /* axes */
    .axis text { fill: #6b7280; font-size: 11px; font-family: "Play", sans-serif; }
    .axis path, .axis line { stroke: #2d3148; }
    .axis .domain { stroke: #2d3148; }
    svg text { font-family: "Play", sans-serif; }

    /* grid */
    .grid line { stroke: #1f2235; stroke-dasharray: 3,3; }
    .grid path { stroke: none; }

    /* CI band — color set inline per group */
    .ci-band { opacity: 0.10; }

    /* CI boundary lines — color set inline per group */
    .ci-upper, .ci-lower {
      fill: none;
      stroke-width: 1;
      stroke-dasharray: 4,3;
      opacity: 0.40;
    }

    /* main series line — color set inline per group */
    .line-main {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: square;
      stroke-linejoin: miter;
    }

    /* tooltip */
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #1f2235;
      border: 1px solid #3d4168;
      border-radius: 0;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
      color: #e2e8f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.15s;
      min-width: 170px;
    }

    .tooltip .t-date  { font-weight: 700; color: #94a3b8; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tooltip .t-row   { display: flex; align-items: center; gap: 6px; }
    .tooltip .t-dot   { width: 8px; height: 8px; flex-shrink: 0; }
    .tooltip .t-label { color: #9ca3af; font-size: 11px; }
    .tooltip .t-val   { font-weight: 700; margin-left: auto; padding-left: 8px; }
    .tooltip .t-ci    { color: #6b7280; font-size: 10.5px; margin-left: 14px; }
    .tooltip .t-sep   { border: none; border-top: 1px solid #2d3148; margin: 5px 0; }

    /* legend */
    .legend { display: flex; gap: 1.4rem; flex-wrap: wrap; margin-top: 1.1rem; padding-left: 52px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: #9ca3af; }
    .legend-line  { width: 20px; height: 3px; }
  </style>
</head>
