<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Failure Probability Over Time</title>
  <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Play", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 0;
      padding: 2rem 2.5rem 2rem 2rem;
      width: 860px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }

    .header { margin-bottom: 1.5rem; }

    .header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f0f4ff;
      letter-spacing: 0.01em;
    }

    .header p {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.3rem;
    }

    /* axes */
    .axis text { fill: #6b7280; font-size: 11px; font-family: "Play", sans-serif; }
    .axis path, .axis line { stroke: #2d3148; }
    .axis .domain { stroke: #2d3148; }
    svg text { font-family: "Play", sans-serif; }

    /* grid */
    .grid line { stroke: #1f2235; stroke-dasharray: 3,3; }
    .grid path { stroke: none; }

    /* CI band — color set inline per group */
    .ci-band { opacity: 0.10; }

    /* CI boundary lines — color set inline per group */
    .ci-upper, .ci-lower {
      fill: none;
      stroke-width: 1;
      stroke-dasharray: 4,3;
      opacity: 0.40;
    }

    /* main series line — color set inline per group */
    .line-main {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: square;
      stroke-linejoin: miter;
    }

    /* tooltip */
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #1f2235;
      border: 1px solid #3d4168;
      border-radius: 0;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
      color: #e2e8f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.15s;
      min-width: 170px;
    }

    .tooltip .t-date  { font-weight: 700; color: #94a3b8; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .tooltip .t-row   { display: flex; align-items: center; gap: 6px; }
    .tooltip .t-dot   { width: 8px; height: 8px; flex-shrink: 0; }
    .tooltip .t-label { color: #9ca3af; font-size: 11px; }
    .tooltip .t-val   { font-weight: 700; margin-left: auto; padding-left: 8px; }
    .tooltip .t-ci    { color: #6b7280; font-size: 10.5px; margin-left: 14px; }
    .tooltip .t-sep   { border: none; border-top: 1px solid #2d3148; margin: 5px 0; }

    /* legend */
    .legend { display: flex; gap: 1.4rem; flex-wrap: wrap; margin-top: 1.1rem; padding-left: 52px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11.5px; color: #9ca3af; }
    .legend-line  { width: 20px; height: 3px; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Failure Probability Over Time</h1>
    <p>Component reliability degradation by group · 95% confidence interval</p>
  </div>
  <div id="chart"></div>
  <div class="legend" id="legend"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  // ── Colour palette (add more entries to support more groups) ──────────────
  const PALETTE = {
    "A": "#818cf8",   // indigo
    "B": "#34d399",   // emerald
    "C": "#fb923c",   // orange
    "D": "#f472b6",   // pink
  };

  // ── Dummy data (mixed groups) ─────────────────────────────────────────────
  
  const raw = [
    // Group A — fast degradation
    { month: 0,  p: 0.021, lo: 0.008, hi: 0.041, group: "A" },
    { month: 1,  p: 0.034, lo: 0.015, hi: 0.058, group: "A" },
    { month: 2,  p: 0.052, lo: 0.028, hi: 0.082, group: "A" },
    { month: 3,  p: 0.071, lo: 0.042, hi: 0.107, group: "A" },
    { month: 4,  p: 0.095, lo: 0.060, hi: 0.138, group: "A" },
    { month: 5,  p: 0.124, lo: 0.082, hi: 0.174, group: "A" },
    { month: 6,  p: 0.158, lo: 0.108, hi: 0.216, group: "A" },
    { month: 7,  p: 0.197, lo: 0.138, hi: 0.263, group: "A" },
    { month: 8,  p: 0.241, lo: 0.171, hi: 0.316, group: "A" },
    { month: 9,  p: 0.289, lo: 0.208, hi: 0.374, group: "A" },
    { month: 10, p: 0.342, lo: 0.251, hi: 0.437, group: "A" },
    { month: 11, p: 0.401, lo: 0.300, hi: 0.505, group: "A" },
    { month: 12, p: 0.463, lo: 0.353, hi: 0.576, group: "A" },
    { month: 13, p: 0.529, lo: 0.410, hi: 0.647, group: "A" },
    { month: 14, p: 0.596, lo: 0.469, hi: 0.720, group: "A" },
    { month: 15, p: 0.662, lo: 0.529, hi: 0.790, group: "A" },
    { month: 16, p: 0.722, lo: 0.584, hi: 0.851, group: "A" },
    { month: 17, p: 0.775, lo: 0.634, hi: 0.902, group: "A" },
    { month: 18, p: 0.820, lo: 0.679, hi: 0.940, group: "A" },

    // Group B — slower, wider CI
    { month: 0,  p: 0.011, lo: 0.003, hi: 0.028, group: "B" },
    { month: 1,  p: 0.018, lo: 0.006, hi: 0.038, group: "B" },
    { month: 2,  p: 0.029, lo: 0.011, hi: 0.056, group: "B" },
    { month: 3,  p: 0.043, lo: 0.019, hi: 0.078, group: "B" },
    { month: 4,  p: 0.061, lo: 0.031, hi: 0.104, group: "B" },
    { month: 5,  p: 0.083, lo: 0.046, hi: 0.133, group: "B" },
    { month: 6,  p: 0.110, lo: 0.065, hi: 0.167, group: "B" },
    { month: 7,  p: 0.142, lo: 0.088, hi: 0.207, group: "B" },
    { month: 8,  p: 0.179, lo: 0.115, hi: 0.252, group: "B" },
    { month: 9,  p: 0.221, lo: 0.147, hi: 0.304, group: "B" },
    { month: 10, p: 0.267, lo: 0.182, hi: 0.360, group: "B" },
    { month: 11, p: 0.317, lo: 0.221, hi: 0.420, group: "B" },
    { month: 12, p: 0.370, lo: 0.262, hi: 0.483, group: "B" },
    { month: 13, p: 0.424, lo: 0.306, hi: 0.548, group: "B" },
    { month: 14, p: 0.479, lo: 0.352, hi: 0.612, group: "B" },
    { month: 15, p: 0.533, lo: 0.399, hi: 0.671, group: "B" },
    { month: 16, p: 0.584, lo: 0.444, hi: 0.727, group: "B" },
    { month: 17, p: 0.631, lo: 0.487, hi: 0.775, group: "B" },
    { month: 18, p: 0.673, lo: 0.526, hi: 0.815, group: "B" },

    // Group C — resilient component, narrow CI
    { month: 0,  p: 0.007, lo: 0.002, hi: 0.016, group: "C" },
    { month: 1,  p: 0.010, lo: 0.004, hi: 0.021, group: "C" },
    { month: 2,  p: 0.015, lo: 0.007, hi: 0.028, group: "C" },
    { month: 3,  p: 0.022, lo: 0.011, hi: 0.038, group: "C" },
    { month: 4,  p: 0.031, lo: 0.018, hi: 0.050, group: "C" },
    { month: 5,  p: 0.043, lo: 0.026, hi: 0.065, group: "C" },
    { month: 6,  p: 0.058, lo: 0.037, hi: 0.084, group: "C" },
    { month: 7,  p: 0.076, lo: 0.051, hi: 0.107, group: "C" },
    { month: 8,  p: 0.097, lo: 0.067, hi: 0.132, group: "C" },
    { month: 9,  p: 0.121, lo: 0.086, hi: 0.161, group: "C" },
    { month: 10, p: 0.149, lo: 0.108, hi: 0.195, group: "C" },
    { month: 11, p: 0.180, lo: 0.133, hi: 0.232, group: "C" },
    { month: 12, p: 0.213, lo: 0.161, hi: 0.271, group: "C" },
    { month: 13, p: 0.249, lo: 0.191, hi: 0.312, group: "C" },
    { month: 14, p: 0.287, lo: 0.223, hi: 0.355, group: "C" },
    { month: 15, p: 0.326, lo: 0.257, hi: 0.400, group: "C" },
    { month: 16, p: 0.366, lo: 0.292, hi: 0.445, group: "C" },
    { month: 17, p: 0.406, lo: 0.327, hi: 0.490, group: "C" },
    { month: 18, p: 0.446, lo: 0.362, hi: 0.534, group: "C" },
  ];

  // Map months to days (each month = 30 days), starting at day 0
  const data = raw.map(d => ({
    day:   d.month * 30,
    p: d.p, lo: d.lo, hi: d.hi,
    group: d.group,
  }));

  // ── Plot factory ──────────────────────────────────────────────────────────
  function failureRatePlot(selector, data, options = {}) {
    const {
      palette         = PALETTE,
      tooltipSelector = "#tooltip",
      legendSelector  = "#legend",
      margin          = { top: 24, right: 32, bottom: 44, left: 56 },
      totalW          = 780,
      totalH          = 380,
      title           = null,
      subtitle        = null,
      xLabel          = "Days",
      yLabel          = "Failure Probability",
    } = options;

    // Update header text if overrides provided
    if (title)    document.querySelector(".header h1").textContent = title;
    if (subtitle) document.querySelector(".header p").textContent  = subtitle;

    // Group by the `group` key (works with any set of groups present in data)
    const grouped = d3.group(data, d => d.group);
    const groupKeys = [...grouped.keys()];

    // Resolve colour — fall back to a generated hue if group not in palette
    const fallbackScale = d3.scaleOrdinal(d3.schemeTableau10);
    const color = key => palette[key] ?? fallbackScale(key);

    // ── Layout ──────────────────────────────────────────────────────────────
    const W = totalW - margin.left - margin.right;
    const H = totalH - margin.top - margin.bottom;

    const svg = d3.select(selector)
      .append("svg")
      .attr("width", totalW)
      .attr("height", totalH);

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    // ── Scales ──────────────────────────────────────────────────────────────
    const x = d3.scaleLinear()
      .domain([0, d3.max(data, d => d.day)])
      .range([0, W]);

    const y = d3.scaleLinear()
      .domain([0, 1])
      .range([H, 0])
      .nice();

    // ── Grid ────────────────────────────────────────────────────────────────
    g.append("g").attr("class", "grid")
      .call(d3.axisLeft(y).ticks(5).tickSize(-W).tickFormat(""));

    // ── Axes ────────────────────────────────────────────────────────────────
    g.append("g")
      .attr("class", "axis")
      .attr("transform", `translate(0,${H})`)
      .call(d3.axisBottom(x)
        .ticks(7)
        .tickFormat(d => d));

    g.append("g")
      .attr("class", "axis")
      .call(d3.axisLeft(y)
        .ticks(5)
        .tickFormat(d => `${(d * 100).toFixed(0)}%`));

    // axis labels
    g.append("text")
      .attr("x", W / 2).attr("y", H + 40)
      .attr("text-anchor", "middle")
      .attr("fill", "#4b5563").attr("font-size", 11)
      .text(xLabel);

    g.append("text")
      .attr("transform", "rotate(-90)")
      .attr("x", -H / 2).attr("y", -44)
      .attr("text-anchor", "middle")
      .attr("fill", "#4b5563").attr("font-size", 11)
      .text(yLabel);

    // ── Path generators ─────────────────────────────────────────────────────
    const areaGen = d3.area()
      .x(d  => x(d.day))
      .y0(d => y(d.lo))
      .y1(d => y(d.hi))
      .curve(d3.curveCatmullRom.alpha(0.5));

    const lineGen = field => d3.line()
      .x(d => x(d.day))
      .y(d => y(d[field]))
      .curve(d3.curveCatmullRom.alpha(0.5));

    // ── Draw one series per group ────────────────────────────────────────────
    groupKeys.forEach(key => {
      const series = grouped.get(key);
      const c = color(key);

      // CI band
      g.append("path")
        .datum(series)
        .attr("class", "ci-band")
        .attr("fill", c)
        .attr("d", areaGen);

      // CI boundary lines
      ["hi", "lo"].forEach(field => {
        g.append("path")
          .datum(series)
          .attr("class", field === "hi" ? "ci-upper" : "ci-lower")
          .attr("stroke", c)
          .attr("d", lineGen(field)(series));
      });

      // Main line with draw animation
      const mainPath = g.append("path")
        .datum(series)
        .attr("class", "line-main")
        .attr("stroke", c)
        .attr("d", lineGen("p")(series));

      const len = mainPath.node().getTotalLength();
      mainPath
        .attr("stroke-dasharray", `${len} ${len}`)
        .attr("stroke-dashoffset", len)
        .transition().duration(1600).ease(d3.easeCubicInOut)
        .attr("stroke-dashoffset", 0);
    });

    // ── Hover interaction ────────────────────────────────────────────────────
    // One dot per group
    const dots = {};
    groupKeys.forEach(key => {
      dots[key] = g.append("circle")
        .attr("r", 5)
        .attr("fill", color(key))
        .attr("stroke", "#1a1d27")
        .attr("stroke-width", 2.5)
        .style("opacity", 0);
    });

    // Vertical crosshair rule
    const rule = g.append("line")
      .attr("y1", 0).attr("y2", H)
      .attr("stroke", "#3d4168")
      .attr("stroke-width", 1)
      .attr("stroke-dasharray", "3,3")
      .style("opacity", 0);

    const tooltip = d3.select(tooltipSelector);
    const bisect  = d3.bisector(d => d.day).left;
    const pct     = v => `${(v * 100).toFixed(1)}%`;

    g.append("rect")
      .attr("width", W).attr("height", H)
      .attr("fill", "transparent")
      .on("mousemove", function(event) {
        const [mx] = d3.pointer(event);
        const x0 = x.invert(mx);

        // Snap each group to its nearest point
        const snapped = groupKeys.map(key => {
          const series = grouped.get(key);
          const i  = bisect(series, x0, 1);
          const d0 = series[i - 1], d1 = series[i] || d0;
          return x0 - d0.day > d1.day - x0 ? d1 : d0;
        });

        // Move dots
        groupKeys.forEach((key, i) => {
          const d = snapped[i];
          dots[key].attr("cx", x(d.day)).attr("cy", y(d.p)).style("opacity", 1);
        });

        // Move rule to first group's snapped x
        rule.attr("x1", x(snapped[0].day)).attr("x2", x(snapped[0].day)).style("opacity", 1);

        // Build tooltip rows
        const rows = groupKeys.map((key, i) => {
          const d = snapped[i];
          const c = color(key);
          return `
            <div class="t-row">
              <div class="t-dot" style="background:${c};"></div>
              <span class="t-label">Group ${key}</span>
              <span class="t-val" style="color:${c};">${pct(d.p)}</span>
            </div>
            <div class="t-ci">95% CI: ${pct(d.lo)} – ${pct(d.hi)}</div>
          `;
        }).join('<hr class="t-sep">');

        const [px, py] = [event.pageX, event.pageY];
        tooltip
          .style("opacity", 1)
          .style("left", `${px + 14}px`)
          .style("top",  `${py - 80}px`)
          .html(`<div class="t-date">Day ${snapped[0].day}</div>${rows}`);
      })
      .on("mouseleave", () => {
        groupKeys.forEach(key => dots[key].style("opacity", 0));
        rule.style("opacity", 0);
        tooltip.style("opacity", 0);
      });

    // ── Legend (dynamic) ─────────────────────────────────────────────────────
    const legendEl = document.querySelector(legendSelector);

    groupKeys.forEach(key => {
      const c = color(key);
      legendEl.innerHTML += `
        <div class="legend-item">
          <div class="legend-line" style="background:${c};"></div>
          Group ${key}
        </div>`;
    });

    return svg;
  }

  failureRatePlot("#chart", data);

</script>
</body>
</html>
